# Valkey configuration for the timeseries module (Docker)

# Load the timeseries module
loadmodule /usr/local/lib/libvalkey_timeseries.so

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# General
daemonize no
supervised no
pidfile /var/run/valkey_6379.pid
loglevel notice
logfile ""

# Persistence
save ""
databases 1

# Memory
maxmemory-policy noeviction

# Cluster (disabled by default; enable via docker-compose overrides or env vars)
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 5000
