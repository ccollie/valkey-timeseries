syntax = "proto3";

package valkey_timeseries.fanout;

message Label {
  string name = 1;
  string value = 2;
}

message Sample {
  int64 timestamp = 1;
  double value = 2;
}

enum CompressionType {
  UNCOMPRESSED = 0;
  GORILLA = 1;
  PCO = 2;
  TSXOR = 3;
  XOR2 = 4;
}

message SampleData {
  uint32 version = 1;
  CompressionType compression = 2;
  bytes data = 3;
}

message SeriesChunk {
  string key = 1;
  string group_value = 2;
  repeated Label labels = 3;
  SampleData data = 4;
}

message MGetValue {
  string key = 1;
  Sample sample = 2;
  repeated Label labels = 3;
}

message SeriesRangeResponse {
  string key = 1;
  string group_label_value = 2;
  repeated Label labels = 3;
  // One chunk of (bucket_ts, value) pairs per aggregation column. Raw samples
  // and single-aggregation buckets are a one-element list; multi-aggregation
  // buckets carry one column per aggregator (>= 2 columns). An empty
  // multi-aggregation series carries zero columns. All columns share identical
  // timestamps and length by construction.
  repeated SampleData columns = 4;
}

message MultiGetResponse {
  repeated MGetValue values = 1;
}

message MDelResponse {
  uint64 deleted_count = 1;
}

// Reducer state for one bucket; field meaning depends on the reducer type
// (carried in the request). count is the number of accepted (non-rejected)
// values; acc1/acc2 hold sums, extrema or the selected value; ts is the
// contributing sample timestamp for first/last.
message ReducePartialState {
  uint64 count = 1;
  double acc1 = 2;
  double acc2 = 3;
  int64 ts = 4;
}

// One (group, shard) partial series, ascending timestamps. `states` is
// row-major: bucket i, aggregation column j is at states[i * column_count + j]
// (states.len() == bucket_timestamps.len() * column_count). Single-aggregation
// and no-AGGREGATION queries have column_count == 1; a multi-aggregation query
// has one column per aggregator, all reduced with the same REDUCE type.
message GroupPartialSeries {
  string group_label_value = 1;
  repeated string source_keys = 2;
  repeated int64 bucket_timestamps = 3;
  repeated ReducePartialState states = 4;
  uint32 column_count = 5;
}

message MultiRangeResponse {
  repeated SeriesRangeResponse series = 1;
  // Populated instead of `series` when the request set apply_group_reduce.
  repeated GroupPartialSeries group_partials = 2;
}

message IndexQueryResponse {
  repeated string keys = 1;
}

enum ErrorKind {
  FAILED = 0;
  NODE_UNREACHABLE = 1;
  TIMEOUT = 2;
  UNKNOWN_MESSAGE_TYPE = 3;
  PERMISSION_DENIED = 4;
  KEY_PERMISSION_DENIED = 5;
  SERIALIZATION = 6;
  BAD_REQUEST = 7;
  INTERNAL = 8;
  GENERIC = 9;
}

message ErrorResponse {
  ErrorKind kind = 1;
  string message = 2;
}

message LabelValuesResponse {
  repeated string values = 1;
}

message LabelNamesResponse {
  repeated string names = 1;
}

message LabelSearchResult {
  string value = 1;
  double score = 2;
  uint64 cardinality = 3;
}

message LabelSearchResponse {
  repeated LabelSearchResult results = 1;
  bool has_more = 2;
}

message CardinalityResponse {
  uint64 cardinality = 1;
}

message PostingStat {
  string name = 1;
  uint64 count = 2;
}

message StatsResponse {
  uint64 series_count = 1;
  repeated PostingStat series_count_by_metric_name = 2;
  repeated PostingStat series_count_by_label_name = 3;
  repeated PostingStat series_count_by_label_value_pairs = 4;
  repeated PostingStat series_count_by_focus_label_value = 5;
  bytes labels_bitmap = 6;
  bytes label_value_pairs_bitmap = 7;
}